[build]
builder = "dockerfile"

[deploy]
startCommand = "sh -c 'chown -R bardo:bardo /data && su bardo -s /bin/sh -c \"alembic upgrade head\" && exec su bardo -s /bin/sh -c \"uvicorn atrium.main:app --host 0.0.0.0 --port $PORT --workers 1\"'"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
